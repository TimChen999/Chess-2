<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chess²</title>
<style>
  /* ---------- Layout / theme ---------- */
  :root {
    --bg:#1f1f23; --panel:#2a2a30; --line:#3a3a40; --text:#eaeaea;
    --light:#ecd9b8; --dark:#a97c5a;
    --accent:#f6d365; --danger:#d96868; --good:#5fb56a;
  }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text);
         margin: 0; min-height: 100vh; }
  .scene { display: none; flex-direction: column; align-items: center;
           padding: 24px; min-height: 100vh; }
  .scene.active { display: flex; }
  h1 { margin: 0 0 12px; font-weight: 500; letter-spacing: 1px; }
  h2 { margin: 0 0 16px; font-weight: 500; }
  h3 { margin: 12px 0 8px; font-weight: 500; font-size: 15px; color: #c8c8d0; }
  button { background: var(--line); color: var(--text); border: 1px solid #555;
           padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
  button:hover { background: #4a4a52; }
  button.primary { background: #4a6a8a; border-color: #6a8aaa; }
  button.primary:hover { background: #5a7a9a; }

  /* ---------- Main menu ---------- */
  #menu .menu-card { background: var(--panel); padding: 36px 56px; border-radius: 12px;
                     box-shadow: 0 8px 30px rgba(0,0,0,0.4); text-align: center;
                     margin-top: 8vh; }
  #menu h1 { font-size: 56px; margin-bottom: 4px; }
  #menu .tag { color: #999; margin-bottom: 32px; }
  #menu .menu-buttons { display: flex; flex-direction: column; gap: 12px; }
  #menu .menu-buttons button { padding: 14px 22px; font-size: 16px; }

  /* ---------- Game scene ---------- */
  #game-scene { padding-top: 16px; }
  #game-header { display: flex; align-items: center; gap: 16px;
                 width: min(640px, 100%); margin-bottom: 12px; }
  #game-header button { font-size: 13px; }
  #status { flex: 1; text-align: center; font-size: 18px; min-height: 24px; }

  #board { display: grid; grid-template-columns: repeat(8, 72px);
                            grid-template-rows: repeat(8, 72px);
           border: 3px solid var(--line); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .sq { position: relative; cursor: pointer; user-select: none;
        display: flex; align-items: center; justify-content: center; }
  .light { background: var(--light); }
  .dark  { background: var(--dark); }
  .selected { box-shadow: inset 0 0 0 4px var(--accent); }
  .legal-move::after  { content: ''; position: absolute; width: 18px; height: 18px;
                        border-radius: 50%; background: rgba(0,0,0,0.28); pointer-events: none; }
  .legal-cap          { box-shadow: inset 0 0 0 4px rgba(220,40,40,0.7); }
  .in-check           { background: var(--danger) !important; }
  .ability-source     { box-shadow: inset 0 0 0 4px #5fb56a; }
  .ability-target-lightning { box-shadow: inset 0 0 0 4px rgba(120,180,255,0.85); }
  .ability-target-cannon    { box-shadow: inset 0 0 0 4px rgba(255,160,80,0.85); }
  .cannon-pending::before { content: ''; position: absolute; inset: 4px; border-radius: 4px;
                            background: rgba(255,160,80,0.25); pointer-events: none; }
  .cannon-hover::before   { content: ''; position: absolute; inset: 4px; border-radius: 4px;
                            background: rgba(255,160,80,0.55); pointer-events: none; }

  /* ---------- Pieces (in-square content) ---------- */
  .piece { position: relative; width: 100%; height: 100%;
           display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .glyph { font-size: 50px; line-height: 1; }
  .piece-w .glyph { color: #fff; text-shadow: 0 0 1px #000, 0 0 1px #000, 0 0 2px #000; }
  .piece-b .glyph { color: #111; }
  .glyph.frozen { filter: drop-shadow(0 0 4px #6cf) brightness(0.85) hue-rotate(180deg); }

  .hp { position: absolute; top: 2px; left: 2px;
        background: rgba(0,0,0,0.6); color: #fff; padding: 1px 4px;
        font-size: 10px; border-radius: 3px; font-weight: 600; }
  .hp.hp-low { background: rgba(220,40,40,0.85); }
  .fx { position: absolute; top: 2px; right: 2px; display: flex; gap: 2px; }
  .fx > span { font-size: 10px; padding: 1px 3px; border-radius: 3px;
               background: rgba(0,0,0,0.6); color: #fff; }
  .fx-burn   { background: rgba(220,80,40,0.8) !important; }
  .fx-freeze { background: rgba(80,160,220,0.8) !important; }
  .charge { position: absolute; bottom: 2px; right: 2px;
            font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: 600;
            background: rgba(0,0,0,0.6); color: #fff; }
  .charge.charge-ready { background: rgba(95,181,106,0.85); }
  .charge.charge-cool  { background: rgba(0,0,0,0.6); color: #aaa; }

  /* ---------- Ability bar ---------- */
  #ability-bar { display: flex; gap: 8px; flex-wrap: wrap;
                 margin-top: 14px; max-width: 640px; justify-content: center; }
  .ability-btn { font-size: 14px; padding: 6px 12px; }
  .ability-btn-active { background: #4a6a8a; border-color: #6a8aaa; }
  .ability-note { color: #888; font-size: 13px; align-self: center; }

  /* ---------- Promotion picker ---------- */
  #promo { display: none; gap: 10px; margin-top: 12px; background: var(--panel);
           padding: 8px 14px; border-radius: 8px; }
  .promo-btn { font-size: 36px; padding: 4px 10px; cursor: pointer;
               background: var(--light); color: #111; border: 1px solid #888;
               border-radius: 4px; }

  /* ---------- End-game overlay (a banner under the board, NOT modal) ---------- */
  #end-overlay { display: none; margin-top: 14px; padding: 10px 22px;
                 background: var(--panel); border-radius: 8px; font-size: 18px;
                 border: 1px solid var(--line); }

  /* ---------- Customize scene ---------- */
  #customize-scene { padding-top: 16px; }
  #customize-header { display: flex; align-items: center; width: min(960px, 100%);
                      margin-bottom: 12px; }
  #customize-header h2 { flex: 1; }
  #customize-body { display: flex; gap: 16px; width: min(960px, 100%);
                    background: var(--panel); border-radius: 8px;
                    border: 1px solid var(--line); overflow: hidden;
                    min-height: 600px; }
  #piece-list { width: 200px; border-right: 1px solid var(--line);
                overflow-y: auto; }
  .piece-row { display: flex; gap: 8px; padding: 10px 14px; cursor: pointer;
               border-bottom: 1px solid var(--line); align-items: center; }
  .piece-row:hover { background: #34343a; }
  .piece-row.selected { background: #44445a; }
  .row-glyph { font-size: 24px; }
  #editor-pane { flex: 1; padding: 16px 20px; overflow-y: auto; max-height: 80vh; }
  .editor-section { margin-bottom: 18px; padding-bottom: 14px;
                    border-bottom: 1px solid var(--line); }
  .field { display: flex; align-items: center; justify-content: space-between;
           margin: 6px 0; font-size: 14px; gap: 12px; }
  .field input[type=text], .field input[type=number], .field select {
    background: #1f1f23; color: var(--text); border: 1px solid var(--line);
    border-radius: 3px; padding: 4px 8px; min-width: 80px;
  }
  .field-check { justify-content: flex-start; gap: 8px; }
  .field-check input { transform: scale(1.2); }
  .summary { font-size: 12px; color: #999; margin-top: 6px; line-height: 1.4; }
  .editor-footer { display: flex; gap: 8px; flex-wrap: wrap;
                   margin-top: 12px; padding-top: 12px;
                   border-top: 1px solid var(--line); }
  .editor-btn { font-size: 13px; }
  .reach-grid { display: grid; grid-template-columns: repeat(8, 28px);
                grid-template-rows: repeat(8, 28px); margin: 4px 0; }
  .reach-cell { display: flex; align-items: center; justify-content: center;
                font-size: 18px; }
  .reach-cell.light { background: #d8c5a4; }
  .reach-cell.dark  { background: #95684a; }
  .reach-cell.center { box-shadow: inset 0 0 0 2px var(--accent); color: #fff; }
  .reach-cell.reach-move::after { content: ''; width: 8px; height: 8px;
                                  border-radius: 50%; background: rgba(0,0,0,0.5); }
  .reach-cell.reach-cap { box-shadow: inset 0 0 0 2px rgba(220,40,40,0.7); }
</style>
</head>
<body>

<!-- ================= Main menu ================= -->
<div id="menu" class="scene active">
  <div class="menu-card">
    <h1>Chess²</h1>
    <div class="tag">Hot-seat chess with HP, status effects, and per-piece abilities.</div>
    <div class="menu-buttons">
      <button id="btn-play"      class="primary">Start Game</button>
      <button id="btn-customize">Customize Pieces</button>
    </div>
  </div>
</div>

<!-- ================= Game scene ================= -->
<div id="game-scene" class="scene">
  <div id="game-header">
    <button id="btn-back-to-menu">← Menu</button>
    <div id="status"></div>
    <button id="btn-new-game">New game</button>
  </div>
  <div id="board"></div>
  <div id="ability-bar"></div>
  <div id="promo"></div>
  <div id="end-overlay"></div>
</div>

<!-- ================= Customize scene ================= -->
<div id="customize-scene" class="scene">
  <div id="customize-header">
    <h2>Customize Pieces</h2>
  </div>
  <div id="customize-body">
    <div id="piece-list"></div>
    <div id="editor-pane"></div>
  </div>
</div>

<!-- ================= Scripts ================= -->
<script src="js/engine.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/customize.js"></script>
<script>
"use strict";
// Main shell — scene routing + bootstrap.

const Scenes = {
  menu:      document.getElementById('menu'),
  game:      document.getElementById('game-scene'),
  customize: document.getElementById('customize-scene'),
};
function showScene(name) {
  for (const k in Scenes) Scenes[k].classList.toggle('active', k === name);
}

let activeConfig = Config.loadConfig();

UI.init({
  board:       document.getElementById('board'),
  status:      document.getElementById('status'),
  abilityBar:  document.getElementById('ability-bar'),
  promo:       document.getElementById('promo'),
  endOverlay:  document.getElementById('end-overlay'),
  gameConfig:  activeConfig,
});

Customize.init({
  pieceList:  document.getElementById('piece-list'),
  editorPane: document.getElementById('editor-pane'),
  onSave: (savedConfig) => {
    if (savedConfig) {
      activeConfig = savedConfig;
      Config.saveConfig(activeConfig);
      // Re-init UI so any fresh game picks up new defs.
      UI.init({
        board:       document.getElementById('board'),
        status:      document.getElementById('status'),
        abilityBar:  document.getElementById('ability-bar'),
        promo:       document.getElementById('promo'),
        endOverlay:  document.getElementById('end-overlay'),
        gameConfig:  activeConfig,
      });
    }
    showScene('menu');
  },
});

document.getElementById('btn-play').addEventListener('click', () => {
  // Fresh game off the active config.
  UI.init({
    board:       document.getElementById('board'),
    status:      document.getElementById('status'),
    abilityBar:  document.getElementById('ability-bar'),
    promo:       document.getElementById('promo'),
    endOverlay:  document.getElementById('end-overlay'),
    gameConfig:  activeConfig,
  });
  showScene('game');
});

document.getElementById('btn-customize').addEventListener('click', () => {
  Customize.show(activeConfig);
  showScene('customize');
});

document.getElementById('btn-back-to-menu').addEventListener('click', () => {
  showScene('menu');
});

document.getElementById('btn-new-game').addEventListener('click', () => {
  UI.init({
    board:       document.getElementById('board'),
    status:      document.getElementById('status'),
    abilityBar:  document.getElementById('ability-bar'),
    promo:       document.getElementById('promo'),
    endOverlay:  document.getElementById('end-overlay'),
    gameConfig:  activeConfig,
  });
});
</script>
</body>
</html>
